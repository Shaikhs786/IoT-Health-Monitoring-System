<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Patient Login | Smart Remote Patient Monitoring</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet"/>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet"/>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      overflow: hidden;
    }

    body::before, body::after {
      content: '';
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.22;
      animation: float 8s ease-in-out infinite;
      pointer-events: none;
    }
    body::before {
      width: 500px; height: 500px;
      background: radial-gradient(circle, #a855f7, #7c3aed);
      top: -150px; left: -150px;
    }
    body::after {
      width: 400px; height: 400px;
      background: radial-gradient(circle, #ec4899, #a855f7);
      bottom: -100px; right: -100px;
      animation-delay: -4s;
    }
    @keyframes float {
      0%,100% { transform: translateY(0) scale(1); }
      50% { transform: translateY(30px) scale(1.05); }
    }

    .login-wrapper {
      width: 100%; max-width: 460px;
      animation: fadeInUp 0.7s ease both;
    }
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(40px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .card {
      background: rgba(255,255,255,0.06);
      backdrop-filter: blur(30px);
      -webkit-backdrop-filter: blur(30px);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 28px;
      padding: 50px 44px;
      box-shadow: 0 40px 80px rgba(0,0,0,0.5);
    }

    .brand { text-align: center; margin-bottom: 36px; }
    .brand-icon {
      width: 80px; height: 80px;
      background: linear-gradient(135deg, #a855f7, #7c3aed);
      border-radius: 22px;
      display: inline-flex; align-items: center; justify-content: center;
      font-size: 2.2rem; color: white; margin-bottom: 18px;
      box-shadow: 0 12px 30px rgba(168,85,247,0.45);
    }
    .brand h1 { font-size: 1.6rem; font-weight: 800; color: #fff; letter-spacing: -0.5px; }
    .brand p  { font-size: 0.85rem; color: rgba(255,255,255,0.5); margin-top: 4px; }

    .alert-error {
      background: rgba(239,68,68,0.15);
      border: 1px solid rgba(239,68,68,0.4);
      color: #fca5a5;
      padding: 12px 16px; border-radius: 12px;
      font-size: 0.88rem; margin-bottom: 22px;
      display: flex; align-items: center; gap: 8px;
    }

    .form-group { margin-bottom: 20px; }
    .form-group label {
      display: block; font-size: 0.8rem; font-weight: 600;
      color: rgba(255,255,255,0.6); text-transform: uppercase;
      letter-spacing: 0.8px; margin-bottom: 8px;
    }
    .input-wrap { position: relative; }
    .input-wrap i {
      position: absolute; left: 16px; top: 50%;
      transform: translateY(-50%);
      color: rgba(255,255,255,0.35); font-size: 1rem; pointer-events: none;
    }
    .input-wrap input {
      width: 100%; padding: 14px 16px 14px 44px;
      background: rgba(255,255,255,0.07);
      border: 1.5px solid rgba(255,255,255,0.12);
      border-radius: 14px; color: #fff;
      font-size: 0.97rem; font-family: 'Inter', sans-serif;
      transition: border-color 0.25s, box-shadow 0.25s, background 0.25s;
      outline: none;
    }
    .input-wrap input::placeholder { color: rgba(255,255,255,0.3); }
    .input-wrap input:focus {
      border-color: #a855f7;
      background: rgba(168,85,247,0.07);
      box-shadow: 0 0 0 4px rgba(168,85,247,0.15);
    }

    .btn-login {
      width: 100%; padding: 15px;
      background: linear-gradient(135deg, #a855f7 0%, #7c3aed 100%);
      color: white; border: none; border-radius: 14px;
      font-size: 1rem; font-weight: 700; font-family: 'Inter', sans-serif;
      cursor: pointer; margin-top: 8px;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 8px 24px rgba(124,58,237,0.4);
      display: flex; align-items: center; justify-content: center; gap: 10px;
    }
    .btn-login:hover { transform: translateY(-2px); box-shadow: 0 14px 32px rgba(124,58,237,0.55); }
    .btn-login:active { transform: translateY(0); }

    .hint-box {
      margin-top: 28px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 14px; padding: 16px 18px;
      font-size: 0.82rem; color: rgba(255,255,255,0.45); line-height: 1.8;
    }
    .hint-box span { color: rgba(255,255,255,0.7); font-weight: 600; }

    .doctor-link {
      text-align: center; margin-top: 20px;
      font-size: 0.8rem; color: rgba(255,255,255,0.3);
    }
    .doctor-link a { color: #a855f7; text-decoration: none; font-weight: 600; }
    .doctor-link a:hover { text-decoration: underline; }

    .footer-note {
      text-align: center; margin-top: 22px;
      font-size: 0.78rem; color: rgba(255,255,255,0.2);
    }
  </style>
</head>
<body>
  <div class="login-wrapper">
    <div class="card">
      <div class="brand">
        <div class="brand-icon"><i class="fas fa-user-injured"></i></div>
        <h1>Patient Portal</h1>
        <p>View your health data &amp; prescriptions</p>
      </div>

      {% if error %}
      <div class="alert-error">
        <i class="fas fa-exclamation-circle"></i> {{ error }}
      </div>
      {% endif %}

      <form method="POST" action="/patient-login">
        <div class="form-group">
          <label>Patient ID</label>
          <div class="input-wrap">
            <i class="fas fa-id-card"></i>
            <input type="text" name="patient_id" placeholder="Enter your Patient ID" required autocomplete="off"/>
          </div>
        </div>
        <div class="form-group">
          <label>Password</label>
          <div class="input-wrap">
            <i class="fas fa-lock"></i>
            <input type="password" name="password" placeholder="Enter password" required/>
          </div>
        </div>
        <button type="submit" class="btn-login">
          <i class="fas fa-sign-in-alt"></i> Access My Health Data
        </button>
      </form>



      <div class="doctor-link">
        Are you a doctor? <a href="/">Doctor Login →</a>
      </div>
      <div class="doctor-link" style="margin-top:8px;">
        Are you a vendor? <a href="/vendor-login">Vendor Login →</a>
      </div>
    </div>
    <div class="footer-note">Remote Health Monitoring &copy; 2024 &mdash; Powered by ESP8266</div>
  </div>
</body>
</html>
