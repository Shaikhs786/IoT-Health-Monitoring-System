<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Pharmacy Vendor Login | Smart Health Monitor</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet"/>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet"/>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      background: linear-gradient(135deg, #0a1628 0%, #0d2137 50%, #0a2818 100%);
      display: flex; align-items: center; justify-content: center; padding: 20px;
      overflow: hidden;
    }
    body::before, body::after {
      content: ''; position: fixed; border-radius: 50%;
      filter: blur(80px); opacity: 0.2; animation: float 8s ease-in-out infinite; pointer-events: none;
    }
    body::before { width: 500px; height: 500px; background: radial-gradient(circle, #10b981, #059669); top: -150px; left: -150px; }
    body::after  { width: 400px; height: 400px; background: radial-gradient(circle, #34d399, #10b981); bottom: -100px; right: -100px; animation-delay: -4s; }
    @keyframes float { 0%,100%{transform:translateY(0) scale(1);} 50%{transform:translateY(30px) scale(1.05);} }

    .wrapper { width: 100%; max-width: 460px; animation: fadeInUp 0.7s ease both; }
    @keyframes fadeInUp { from{opacity:0;transform:translateY(40px);} to{opacity:1;transform:translateY(0);} }

    .card {
      background: rgba(255,255,255,0.06); backdrop-filter: blur(30px);
      border: 1px solid rgba(255,255,255,0.12); border-radius: 28px;
      padding: 50px 44px; box-shadow: 0 40px 80px rgba(0,0,0,0.5);
    }
    .brand { text-align: center; margin-bottom: 36px; }
    .brand-icon {
      width: 80px; height: 80px;
      background: linear-gradient(135deg, #10b981, #059669);
      border-radius: 22px; display: inline-flex; align-items: center; justify-content: center;
      font-size: 2.2rem; color: white; margin-bottom: 18px;
      box-shadow: 0 12px 30px rgba(16,185,129,0.45);
    }
    .brand h1 { font-size: 1.6rem; font-weight: 800; color: #fff; }
    .brand p  { font-size: 0.85rem; color: rgba(255,255,255,0.5); margin-top: 4px; }

    .alert-error {
      background: rgba(239,68,68,0.15); border: 1px solid rgba(239,68,68,0.4);
      color: #fca5a5; padding: 12px 16px; border-radius: 12px;
      font-size: 0.88rem; margin-bottom: 22px; display: flex; align-items: center; gap: 8px;
    }
    .form-group { margin-bottom: 20px; }
    .form-group label { display: block; font-size: 0.8rem; font-weight: 600; color: rgba(255,255,255,0.6); text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 8px; }
    .input-wrap { position: relative; }
    .input-wrap i { position: absolute; left: 16px; top: 50%; transform: translateY(-50%); color: rgba(255,255,255,0.35); font-size: 1rem; pointer-events: none; }
    .input-wrap input {
      width: 100%; padding: 14px 16px 14px 44px;
      background: rgba(255,255,255,0.07); border: 1.5px solid rgba(255,255,255,0.12);
      border-radius: 14px; color: #fff; font-size: 0.97rem; font-family: 'Inter', sans-serif; outline: none;
      transition: border-color 0.25s, box-shadow 0.25s;
    }
    .input-wrap input::placeholder { color: rgba(255,255,255,0.3); }
    .input-wrap input:focus { border-color: #10b981; background: rgba(16,185,129,0.07); box-shadow: 0 0 0 4px rgba(16,185,129,0.12); }

    .btn-login {
      width: 100%; padding: 15px;
      background: linear-gradient(135deg, #10b981, #059669);
      color: white; border: none; border-radius: 14px;
      font-size: 1rem; font-weight: 700; font-family: 'Inter', sans-serif;
      cursor: pointer; margin-top: 8px;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 8px 24px rgba(16,185,129,0.35);
      display: flex; align-items: center; justify-content: center; gap: 10px;
    }
    .btn-login:hover { transform: translateY(-2px); box-shadow: 0 14px 32px rgba(16,185,129,0.5); }

    .links { text-align: center; margin-top: 20px; font-size: 0.8rem; color: rgba(255,255,255,0.3); }
    .links a { color: #10b981; text-decoration: none; font-weight: 600; margin: 0 8px; }
    .footer-note { text-align: center; margin-top: 22px; font-size: 0.78rem; color: rgba(255,255,255,0.2); }
  </style>
</head>
<body>
  <div class="wrapper">
    <div class="card">
      <div class="brand">
        <div class="brand-icon"><i class="fas fa-pills"></i></div>
        <h1>Pharmacy Vendor</h1>
        <p>Medicine Supply Management Portal</p>
      </div>

      {% if error %}
      <div class="alert-error"><i class="fas fa-exclamation-circle"></i> {{ error }}</div>
      {% endif %}

      <form method="POST" action="/vendor-login">
        <div class="form-group">
          <label>Vendor ID</label>
          <div class="input-wrap">
            <i class="fas fa-store"></i>
            <input type="text" name="vendor_id" placeholder="Enter Vendor ID" required autocomplete="off"/>
          </div>
        </div>
        <div class="form-group">
          <label>Password</label>
          <div class="input-wrap">
            <i class="fas fa-lock"></i>
            <input type="password" name="password" placeholder="Enter password" required/>
          </div>
        </div>
        <button type="submit" class="btn-login">
          <i class="fas fa-sign-in-alt"></i> Access Vendor Portal
        </button>
      </form>

      <div class="links">
        <a href="/">Doctor Login</a> | <a href="/patient-login">Patient Login</a>
      </div>
    </div>
    <div class="footer-note">Smart Remote Patient Monitoring &copy; 2024 — Apollo Pharmacy Partner</div>
  </div>
</body>
</html>
